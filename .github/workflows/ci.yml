name: CI

on:
    push:
        branches:
            - main
            - master
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.node-version'
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Verify
              run: yarn agent:check
